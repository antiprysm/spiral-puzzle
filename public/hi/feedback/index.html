<article class="page-card feedback-card" id="feedback-card" data-feedback-page="true">
  <header class="feedback-card__header">
    <h1 id="feedback-title" data-base-title="फ़ीडबैक">फ़ीडबैक</h1>
    <p id="feedback-subtitle">हमें बताएं क्या काम कर रहा है, क्या नहीं, और आगे क्या बनाना चाहिए।</p>
  </header>

  <section class="feedback-card__meta" aria-live="polite">
    <p><strong>स्रोत:</strong> <span id="feedback-source">प्रदान नहीं किया गया</span></p>
    <p><strong>श्रेणी:</strong> <span id="feedback-category">सामान्य फ़ीडबैक</span></p>
  </section>

  <form
    id="feedback-form-shell"
    class="feedback-form"
    action="https://formspree.io/f/mnjgqlyy"
    method="post"
    novalidate
  >
    

    <input type="hidden" name="_subject" id="feedback-subject" value="फ़ीडबैक सबमिशन">
    <input type="hidden" name="_next" value="http://localhost:1313/feedback/thanks/">
    <input type="hidden" name="_replyto" id="feedback-replyto" value="">

    <p class="sr-only" aria-hidden="true">
      <label for="feedback-bot-field">इस फ़ील्ड को खाली छोड़ें</label>
      <input id="feedback-bot-field" type="text" name="_gotcha" tabindex="-1" autocomplete="off">
    </p>

    <label id="feedback-message-label" for="feedback-message">संदेश <span aria-hidden="true">*</span></label>
    <textarea id="feedback-message" name="message" rows="6" required placeholder="हमें बताएं क्या हुआ, आपकी क्या अपेक्षा थी, और कोई भी विवरण जो मदद कर सके।"></textarea>

    <label for="feedback-email">ईमेल (वैकल्पिक)</label>
    <input id="feedback-email" name="email" type="email" placeholder="you@example.com" autocomplete="email">

    <label for="feedback-device">डिवाइस / प्लेटफ़ॉर्म (वैकल्पिक)</label>
    <input id="feedback-device" name="device" type="text" placeholder="जैसे, iPhone 15 (iOS 18), Pixel 8 (Android 15), Web Chrome">

    <label for="feedback-app-name">ऐप</label>
    <input id="feedback-app-name" name="app_name" type="text" readonly value="Hambungle App">

    <label for="feedback-category-name">फ़ीडबैक श्रेणी</label>
    <input id="feedback-category-name" name="feedback_category_name" type="text" readonly value="सामान्य फ़ीडबैक">

    <input id="feedback-source-input" name="source" type="hidden" value="unknown">
    <input id="feedback-type-input" name="type" type="hidden" value="general">

    <button id="feedback-submit" type="submit">फ़ीडबैक भेजें</button>
  </form>
</article>
