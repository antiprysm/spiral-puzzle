<script id="leaderboard-i18n" type="application/json">
  {
    "statusLoading": "\"लीडरबोर्ड लोड हो रहा है...\"",
    "statusEmptyForSize": "\"__SIZE__ के लिए अभी कोई स्कोर नहीं है।\"",
    "statusShowingOne": "\"__SIZE__ के लिए 1 स्कोर दिखाया जा रहा है।\"",
    "statusShowingMany": "\"__SIZE__ के लिए __COUNT__ स्कोर दिखाए जा रहे हैं।\"",
    "statusErrorLoad": "\"अभी लीडरबोर्ड लोड नहीं हो सका।\"",
    "paginationPrev": "\"← पिछला\"",
    "paginationNext": "\"अगला →\"",
    "paginationPageOf": "\"पेज __CURRENT__ / __TOTAL__\""
  }
  </script>
  
  <script>
    const LEADERBOARD_API = "https://scores.hambungle.com/api/highscores";
    const ROWS_PER_PAGE = 10;
    const leaderboardI18n = JSON.parse(
      document.getElementById("leaderboard-i18n").textContent
    );

  let activeLeaderboardSize = "10x10";
  let leaderboardData = {
    "10x10": [],
    "15x15": [],
    "20x20": [],
  };
  let currentPageBySize = {
    "10x10": 1,
    "15x15": 1,
    "20x20": 1,
  };

  function interpolate(template, vars) {
  return String(template)
    .replaceAll("__SIZE__", vars.size ?? "")
    .replaceAll("__COUNT__", vars.count ?? "")
    .replaceAll("__CURRENT__", vars.current ?? "")
    .replaceAll("__TOTAL__", vars.total ?? "");
}

function renderCountryMarkup(countryCodeRaw) {
  const countryCode = String(countryCodeRaw || "").trim().toUpperCase();

  if (!countryCode) {
    return "";
  }

  const safeCode = escapeHtml(countryCode);
  const flagClass = `fi fi-${countryCode.toLowerCase()}`;

  return `
    <span class="lb-country-wrap">
      <span class="lb-country-flag ${flagClass}" aria-hidden="true"></span>
      <span class="lb-country-code">${safeCode}</span>
    </span>
  `;
}

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function medalForRank(rank) {
    if (rank === 1) return "🥇";
    if (rank === 2) return "🥈";
    if (rank === 3) return "🥉";
    return "🏅";
  }

  function renderTopThree(rows) {
    const top3El = document.getElementById("leaderboard-top3");
    top3El.innerHTML = "";

    const topThree = rows.slice(0, 3);

    if (!topThree.length) return;

    topThree.forEach((row, index) => {
      const rank = index + 1;
      const card = document.createElement("div");
      card.className = `leaderboard-card rank-${rank}`;
      card.innerHTML = `
        <div class="medal">${medalForRank(rank)}</div>
        <div class="player">#${rank} ${escapeHtml(row.username)}</div>
        <div class="country">${renderCountryMarkup(row.countryiso || row.countryISO || "")}</div>
        <div class="score">${Number(row.score || 0).toLocaleString()}</div>
      `;
      top3El.appendChild(card);
    });
  }

  function renderTable(rows, currentPage) {
    const bodyEl = document.getElementById("leaderboard-body");
    bodyEl.innerHTML = "";

    const startIndex = (currentPage - 1) * ROWS_PER_PAGE;
    const endIndex = startIndex + ROWS_PER_PAGE;
    const pagedRows = rows.slice(startIndex, endIndex);

    pagedRows.forEach((row, index) => {
      const absoluteRank = startIndex + index + 1;
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${absoluteRank}</td>
        <td>${escapeHtml(row.username)}</td>
        <td>${renderCountryMarkup(row.countryiso || row.countryISO || "")}</td>
        <td>${Number(row.score || 0).toLocaleString()}</td>
      `;
      bodyEl.appendChild(tr);
    });
  }

  function renderPagination(rows, currentPage, sizeKey) {
    const paginationEl = document.getElementById("leaderboard-pagination");
    paginationEl.innerHTML = "";

    const totalPages = Math.max(1, Math.ceil(rows.length / ROWS_PER_PAGE));

    const prevBtn = document.createElement("button");
    prevBtn.textContent = leaderboardI18n.paginationPrev;
    prevBtn.className = "lb-page-btn";
    prevBtn.disabled = currentPage <= 1;
    prevBtn.addEventListener("click", () => {
      if (currentPageBySize[sizeKey] > 1) {
        currentPageBySize[sizeKey]--;
        renderLeaderboardView(sizeKey);
      }
    });

    const pageInfo = document.createElement("span");
    pageInfo.className = "lb-page-info";
    pageInfo.textContent = interpolate(leaderboardI18n.paginationPageOf, { current: currentPage, total: totalPages });

    const nextBtn = document.createElement("button");
    nextBtn.textContent = leaderboardI18n.paginationNext;
    nextBtn.className = "lb-page-btn";
    nextBtn.disabled = currentPage >= totalPages;
    nextBtn.addEventListener("click", () => {
      if (currentPageBySize[sizeKey] < totalPages) {
        currentPageBySize[sizeKey]++;
        renderLeaderboardView(sizeKey);
      }
    });

    paginationEl.appendChild(prevBtn);
    paginationEl.appendChild(pageInfo);
    paginationEl.appendChild(nextBtn);
  }

  function renderLeaderboardView(size) {
    const statusEl = document.getElementById("leaderboard-status");
    const rows = leaderboardData[size] || [];
    const currentPage = currentPageBySize[size] || 1;

    if (!rows.length) {
      document.getElementById("leaderboard-top3").innerHTML = "";
      document.getElementById("leaderboard-body").innerHTML = "";
      document.getElementById("leaderboard-pagination").innerHTML = "";
      statusEl.textContent = interpolate(leaderboardI18n.statusEmptyForSize, { size });
      return;
    }

    const totalPages = Math.max(1, Math.ceil(rows.length / ROWS_PER_PAGE));
    if (currentPageBySize[size] > totalPages) {
      currentPageBySize[size] = totalPages;
    }

    statusEl.textContent = rows.length === 1
      ? interpolate(leaderboardI18n.statusShowingOne, { size })
      : interpolate(leaderboardI18n.statusShowingMany, { count: rows.length, size });

    renderTopThree(rows);
    renderTable(rows, currentPageBySize[size]);
    renderPagination(rows, currentPageBySize[size], size);
  }

  async function loadSpiralLeaderboard() {
    const statusEl = document.getElementById("leaderboard-status");
    statusEl.textContent = leaderboardI18n.statusLoading;

    try {
      const response = await fetch(LEADERBOARD_API);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();

      leaderboardData = {
        "10x10": data["10x10"] || [],
        "15x15": data["15x15"] || [],
        "20x20": data["20x20"] || [],
      };

      renderLeaderboardView(activeLeaderboardSize);
    } catch (error) {
      console.error("Failed to load Spiral leaderboard:", error);
      document.getElementById("leaderboard-top3").innerHTML = "";
      document.getElementById("leaderboard-body").innerHTML = "";
      document.getElementById("leaderboard-pagination").innerHTML = "";
      statusEl.textContent = leaderboardI18n.statusErrorLoad;
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".lb-tab").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".lb-tab").forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        activeLeaderboardSize = button.dataset.size;
        renderLeaderboardView(activeLeaderboardSize);
      });
    });

    loadSpiralLeaderboard();
  });
</script>
