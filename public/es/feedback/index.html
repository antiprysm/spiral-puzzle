  <main class="wrap">
    
<article class="page-card feedback-card" id="feedback-card" data-feedback-page="true">
  <header class="feedback-card__header">
    <h1 id="feedback-title" data-base-title="Comentarios">Comentarios</h1>
    <p id="feedback-subtitle">Cuéntanos qué funciona, qué no y qué deberíamos construir después.</p>
  </header>

  <section class="feedback-card__meta" aria-live="polite">
    <p><strong>Origen:</strong> <span id="feedback-source">No proporcionado</span></p>
    <p><strong>Categoría:</strong> <span id="feedback-category">Comentarios generales</span></p>
  </section>

  <form
    id="feedback-form-shell"
    class="feedback-form"
    action="https://formspree.io/f/mnjgqlyy"
    method="post"
    novalidate
  >
    

    <input type="hidden" name="_subject" id="feedback-subject" value="Envío de comentarios">
    <input type="hidden" name="_next" value="http://localhost:1313/feedback/thanks/">
    <input type="hidden" name="_replyto" id="feedback-replyto" value="">

    <p class="sr-only" aria-hidden="true">
      <label for="feedback-bot-field">Deja este campo vacío</label>
      <input id="feedback-bot-field" type="text" name="_gotcha" tabindex="-1" autocomplete="off">
    </p>

    <label id="feedback-message-label" for="feedback-message">Mensaje <span aria-hidden="true">*</span></label>
    <textarea id="feedback-message" name="message" rows="6" required placeholder="Cuéntanos qué pasó, qué esperabas y cualquier detalle que pueda ayudar."></textarea>

    <label for="feedback-email">Correo electrónico (opcional)</label>
    <input id="feedback-email" name="email" type="email" placeholder="you@example.com" autocomplete="email">

    <label for="feedback-device">Dispositivo / plataforma (opcional)</label>
    <input id="feedback-device" name="device" type="text" placeholder="p. ej., iPhone 15 (iOS 18), Pixel 8 (Android 15), Chrome web">

    <label for="feedback-app-name">App</label>
    <input id="feedback-app-name" name="app_name" type="text" readonly value="App de Hambungle">

    <label for="feedback-category-name">Categoría de comentarios</label>
    <input id="feedback-category-name" name="feedback_category_name" type="text" readonly value="Comentarios generales">

    <input id="feedback-source-input" name="source" type="hidden" value="unknown">
    <input id="feedback-type-input" name="type" type="hidden" value="general">

    <button id="feedback-submit" type="submit">Enviar comentarios</button>
  </form>
</article>
