  <script>
    function switchSiteLanguage(target) {
      if (!target) return;
  
      var cleanTarget = String(target).split("?")[0].split("#")[0];
      var search = window.location.search || "";
      var hash = window.location.hash || "";
  
      window.location.assign(cleanTarget + search + hash);
    }
  </script>
