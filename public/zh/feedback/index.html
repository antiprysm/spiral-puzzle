  <main class="wrap">
    
<article class="page-card feedback-card" id="feedback-card" data-feedback-page="true">
  <header class="feedback-card__header">
    <h1 id="feedback-title" data-base-title="反馈">反馈</h1>
    <p id="feedback-subtitle">告诉我们哪些做得好、哪些不足，以及我们下一步该做什么。</p>
  </header>

  <section class="feedback-card__meta" aria-live="polite">
    <p><strong>来源：</strong> <span id="feedback-source">未提供</span></p>
    <p><strong>类别：</strong> <span id="feedback-category">一般反馈</span></p>
  </section>

  <form
    id="feedback-form-shell"
    class="feedback-form"
    action="https://formspree.io/f/mnjgqlyy"
    method="post"
    novalidate
    data-ajax="true"
  >

    <input type="hidden" name="_subject" id="feedback-subject" value="反馈提交">
    <input type="hidden" name="_next" id="feedback-next" value="http://localhost:1313/zh/feedback/thanks/">
    <input type="hidden" name="_replyto" id="feedback-replyto" value="">

    <p class="sr-only" aria-hidden="true">
      <label for="feedback-bot-field">请将此字段留空</label>
      <input id="feedback-bot-field" type="text" name="_gotcha" tabindex="-1" autocomplete="off">
    </p>

    <label id="feedback-message-label" for="feedback-message">消息 <span aria-hidden="true">*</span></label>
    <textarea id="feedback-message" name="message" rows="6" required placeholder="请告诉我们发生了什么、你的预期是什么，以及任何可能有帮助的细节。"></textarea>

    <label for="feedback-email">电子邮箱（可选）</label>
    <input id="feedback-email" name="email" type="email" placeholder="you@example.com" autocomplete="email">

    <label for="feedback-device">设备 / 平台（可选）</label>
    <input id="feedback-device" name="device" type="text" placeholder="例如：iPhone 15 (iOS 18)、Pixel 8 (Android 15)、网页 Chrome">

    <label for="feedback-app-name">应用</label>
    <input id="feedback-app-name" name="app_name" type="text" readonly value="Hambungle 应用">

    <label for="feedback-category-name">反馈类别</label>
    <input id="feedback-category-name" name="feedback_category_name" type="text" readonly value="一般反馈">

    <input id="feedback-source-input" name="source" type="hidden" value="unknown">
    <input id="feedback-type-input" name="type" type="hidden" value="general">

    <button id="feedback-submit" type="submit">发送反馈</button>
  </form>
</article>

<script>

  <script>
    function switchSiteLanguage(target) {
      if (!target) return;
  
      var cleanTarget = String(target).split("?")[0].split("#")[0];
      var search = window.location.search || "";
      var hash = window.location.hash || "";
  
      window.location.assign(cleanTarget + search + hash);
    }
  </script>
