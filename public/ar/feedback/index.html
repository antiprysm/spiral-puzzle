<article class="page-card feedback-card" id="feedback-card" data-feedback-page="true">
  <header class="feedback-card__header">
    <h1 id="feedback-title" data-base-title="الملاحظات">الملاحظات</h1>
    <p id="feedback-subtitle">أخبرنا بما يعمل جيدًا وما لا يعمل وما الذي يجب أن نبنيه بعد ذلك.</p>
  </header>

  <section class="feedback-card__meta" aria-live="polite">
    <p><strong>المصدر:</strong> <span id="feedback-source">غير متوفر</span></p>
    <p><strong>الفئة:</strong> <span id="feedback-category">ملاحظات عامة</span></p>
  </section>

  <form
    id="feedback-form-shell"
    class="feedback-form"
    action="https://formspree.io/f/mnjgqlyy"
    method="post"
    novalidate
    data-ajax="true"
  >

    <input type="hidden" name="_subject" id="feedback-subject" value="إرسال ملاحظات">
    <input type="hidden" name="_next" id="feedback-next" value="http://localhost:1313/ar/feedback/thanks/">
    <input type="hidden" name="_replyto" id="feedback-replyto" value="">

    <p class="sr-only" aria-hidden="true">
      <label for="feedback-bot-field">اترك هذا الحقل فارغًا</label>
      <input id="feedback-bot-field" type="text" name="_gotcha" tabindex="-1" autocomplete="off">
    </p>

    <label id="feedback-message-label" for="feedback-message">الرسالة <span aria-hidden="true">*</span></label>
    <textarea id="feedback-message" name="message" rows="6" required placeholder="أخبرنا بما حدث وما الذي كنت تتوقعه وأي تفاصيل قد تساعد."></textarea>

    <label for="feedback-email">البريد الإلكتروني (اختياري)</label>
    <input id="feedback-email" name="email" type="email" placeholder="you@example.com" autocomplete="email">

    <label for="feedback-device">الجهاز / المنصة (اختياري)</label>
    <input id="feedback-device" name="device" type="text" placeholder="مثال: iPhone 15 (iOS 18)، Pixel 8 (Android 15)، Web Chrome">

    <label for="feedback-app-name">التطبيق</label>
    <input id="feedback-app-name" name="app_name" type="text" readonly value="تطبيق Hambungle">

    <label for="feedback-category-name">فئة الملاحظات</label>
    <input id="feedback-category-name" name="feedback_category_name" type="text" readonly value="ملاحظات عامة">

    <input id="feedback-source-input" name="source" type="hidden" value="unknown">
    <input id="feedback-type-input" name="type" type="hidden" value="general">

    <button id="feedback-submit" type="submit">إرسال الملاحظات</button>
  </form>
</article>

  <script>
    function switchSiteLanguage(target) {
      if (!target) return;
  
      var cleanTarget = String(target).split("?")[0].split("#")[0];
      var search = window.location.search || "";
      var hash = window.location.hash || "";
  
      window.location.assign(cleanTarget + search + hash);
    }
  </script>
