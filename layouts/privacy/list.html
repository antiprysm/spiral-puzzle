{{ define "main" }}

<article class="page-card">
  <h1>{{ i18n "pages.privacy.index.title" }}</h1>
  <p class="privacy-description">{{ i18n "pages.privacy.index.description" }}</p>

  <div class="content">
    <p>{{ i18n "pages.privacy.index.body.p1" }}</p>
    <p>{{ i18n "pages.privacy.index.body.p2" }}</p>
  </div>

  <!-- Selector UI -->
  <div class="privacy-selector" role="group" aria-label="{{ i18n "privacy.selector.aria_label" }}">
    <button type="button" class="privacy-option" data-app="spiral">
      {{ i18n "privacy.selector.spiral_word_puzzle" }}
    </button>

    <button type="button" class="privacy-option" data-app="catchledger">
      {{ i18n "privacy.selector.catchledger" }}
    </button>
  </div>

  <!-- Dynamic injection area -->
  <div id="policy" aria-live="polite"></div>
</article>

<script>
  window.hambunglePrivacyI18n = {
    selectorSpiral: {{ i18n "privacy.selector.spiral_word_puzzle" | jsonify }},
    selectorCatchledger: {{ i18n "privacy.selector.catchledger" | jsonify }},
    loadingPolicy: {{ i18n "privacy.loader.loading_policy" | jsonify }},
    errorLoadPage: {{ i18n "privacy.loader.error.load_page" | jsonify }},
    errorContentNotFound: {{ i18n "privacy.loader.error.content_not_found" | jsonify }},
    errorGeneric: {{ i18n "privacy.loader.error.generic" | jsonify }},
    urlSpiral: {{ "/privacy/spiral-word-puzzle/" | relLangURL | jsonify }},
    urlCatchledger: {{ "/privacy/catchledger/" | relLangURL | jsonify }}
  };
</script>
<script src="/js/privacy-loader.js" defer></script>

{{ end }}
