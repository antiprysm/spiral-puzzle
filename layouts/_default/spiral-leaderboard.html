{{ define "main" }}
<div class="wrap spiral-leaderboard-page">
  <div class="leaderboard-hero">
    <h1>Spiral Word Puzzle Leaderboard</h1>
    <p>Top scores across all Spiral Word Puzzle board sizes.</p>
  </div>

  <div class="leaderboard-tabs">
    <button class="lb-tab active" data-size="10x10">10x10</button>
    <button class="lb-tab" data-size="15x15">15x15</button>
    <button class="lb-tab" data-size="20x20">20x20</button>
  </div>

  <p id="leaderboard-status" class="leaderboard-status">Loading leaderboard...</p>

  <div class="leaderboard-top3" id="leaderboard-top3"></div>

  <div class="leaderboard-table-wrap">
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Player</th>
          <th>Country</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </div>
  
  <div id="leaderboard-pagination" class="leaderboard-pagination"></div>
</div>

<style>
  .spiral-leaderboard-page {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  .leaderboard-hero {
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .leaderboard-hero h1 {
    margin-bottom: 0.5rem;
  }

  .leaderboard-hero p {
    color: #4b5563;
  }

  .leaderboard-tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .lb-tab {
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #111827;
    border-radius: 999px;
    padding: 0.7rem 1rem;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s ease;
  }

  .lb-tab:hover {
    transform: translateY(-1px);
  }

  .lb-tab.active {
    background: #111827;
    color: #ffffff;
    border-color: #111827;
  }

  .leaderboard-status {
    text-align: center;
    color: #4b5563;
    margin-bottom: 1rem;
  }

  .leaderboard-top3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .leaderboard-card {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 1rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    text-align: center;
  }

  .leaderboard-card.rank-1 {
    border-color: #f5c542;
  }

  .leaderboard-card.rank-2 {
    border-color: #c0c7d1;
  }

  .leaderboard-card.rank-3 {
    border-color: #cd7f32;
  }

  .leaderboard-card .medal {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }

  .leaderboard-card .player {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 0.35rem;
  }

  .leaderboard-card .country {
    color: #6b7280;
    margin-bottom: 0.35rem;
  }

  .leaderboard-card .score {
    font-size: 1.15rem;
    font-weight: 800;
  }

  .leaderboard-table-wrap {
    overflow-x: auto;
  }

  .leaderboard-table {
    width: 100%;
    border-collapse: collapse;
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.05);
  }

  .leaderboard-table th,
  .leaderboard-table td {
    padding: 0.9rem 1rem;
    text-align: left;
    border-bottom: 1px solid #e5e7eb;
  }

  .leaderboard-table th {
    background: #f9fafb;
    font-weight: 800;
  }

  .leaderboard-table tbody tr:hover {
    background: #f9fafb;
  }

  .leaderboard-pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1rem;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}

.lb-page-btn {
  border: 1px solid #d1d5db;
  background: #ffffff;
  color: #111827;
  border-radius: 10px;
  padding: 0.65rem 1rem;
  cursor: pointer;
  font-weight: 700;
}

.lb-page-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.lb-page-info {
  font-weight: 700;
  color: #374151;
}
</style>

<script>
  const LEADERBOARD_API = "https://scores.hambungle.com/api/highscores";
  const ROWS_PER_PAGE = 10;

  let activeLeaderboardSize = "10x10";
  let leaderboardData = {
    "10x10": [],
    "15x15": [],
    "20x20": [],
  };
  let currentPageBySize = {
    "10x10": 1,
    "15x15": 1,
    "20x20": 1,
  };

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function medalForRank(rank) {
    if (rank === 1) return "🥇";
    if (rank === 2) return "🥈";
    if (rank === 3) return "🥉";
    return "🏅";
  }

  function renderTopThree(rows) {
    const top3El = document.getElementById("leaderboard-top3");
    top3El.innerHTML = "";

    const topThree = rows.slice(0, 3);

    if (!topThree.length) return;

    topThree.forEach((row, index) => {
      const rank = index + 1;
      const card = document.createElement("div");
      card.className = `leaderboard-card rank-${rank}`;
      card.innerHTML = `
        <div class="medal">${medalForRank(rank)}</div>
        <div class="player">#${rank} ${escapeHtml(row.username)}</div>
        <div class="country">${escapeHtml(row.countryiso || row.countryISO || "")}</div>
        <div class="score">${Number(row.score || 0).toLocaleString()}</div>
      `;
      top3El.appendChild(card);
    });
  }

  function renderTable(rows, currentPage) {
    const bodyEl = document.getElementById("leaderboard-body");
    bodyEl.innerHTML = "";

    const startIndex = (currentPage - 1) * ROWS_PER_PAGE;
    const endIndex = startIndex + ROWS_PER_PAGE;
    const pagedRows = rows.slice(startIndex, endIndex);

    pagedRows.forEach((row, index) => {
      const absoluteRank = startIndex + index + 1;
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${absoluteRank}</td>
        <td>${escapeHtml(row.username)}</td>
        <td>${escapeHtml(row.countryiso || row.countryISO || "")}</td>
        <td>${Number(row.score || 0).toLocaleString()}</td>
      `;
      bodyEl.appendChild(tr);
    });
  }

  function renderPagination(rows, currentPage, sizeKey) {
    const paginationEl = document.getElementById("leaderboard-pagination");
    paginationEl.innerHTML = "";

    const totalPages = Math.max(1, Math.ceil(rows.length / ROWS_PER_PAGE));

    const prevBtn = document.createElement("button");
    prevBtn.textContent = "← Prev";
    prevBtn.className = "lb-page-btn";
    prevBtn.disabled = currentPage <= 1;
    prevBtn.addEventListener("click", () => {
      if (currentPageBySize[sizeKey] > 1) {
        currentPageBySize[sizeKey]--;
        renderLeaderboardView(sizeKey);
      }
    });

    const pageInfo = document.createElement("span");
    pageInfo.className = "lb-page-info";
    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;

    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Next →";
    nextBtn.className = "lb-page-btn";
    nextBtn.disabled = currentPage >= totalPages;
    nextBtn.addEventListener("click", () => {
      if (currentPageBySize[sizeKey] < totalPages) {
        currentPageBySize[sizeKey]++;
        renderLeaderboardView(sizeKey);
      }
    });

    paginationEl.appendChild(prevBtn);
    paginationEl.appendChild(pageInfo);
    paginationEl.appendChild(nextBtn);
  }

  function renderLeaderboardView(size) {
    const statusEl = document.getElementById("leaderboard-status");
    const rows = leaderboardData[size] || [];
    const currentPage = currentPageBySize[size] || 1;

    if (!rows.length) {
      document.getElementById("leaderboard-top3").innerHTML = "";
      document.getElementById("leaderboard-body").innerHTML = "";
      document.getElementById("leaderboard-pagination").innerHTML = "";
      statusEl.textContent = `No scores yet for ${size}.`;
      return;
    }

    const totalPages = Math.max(1, Math.ceil(rows.length / ROWS_PER_PAGE));
    if (currentPageBySize[size] > totalPages) {
      currentPageBySize[size] = totalPages;
    }

    statusEl.textContent = `Showing ${rows.length} score${rows.length === 1 ? "" : "s"} for ${size}.`;

    renderTopThree(rows);
    renderTable(rows, currentPageBySize[size]);
    renderPagination(rows, currentPageBySize[size], size);
  }

  async function loadSpiralLeaderboard() {
    const statusEl = document.getElementById("leaderboard-status");
    statusEl.textContent = "Loading leaderboard...";

    try {
      const response = await fetch(LEADERBOARD_API);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();

      leaderboardData = {
        "10x10": data["10x10"] || [],
        "15x15": data["15x15"] || [],
        "20x20": data["20x20"] || [],
      };

      renderLeaderboardView(activeLeaderboardSize);
    } catch (error) {
      console.error("Failed to load Spiral leaderboard:", error);
      document.getElementById("leaderboard-top3").innerHTML = "";
      document.getElementById("leaderboard-body").innerHTML = "";
      document.getElementById("leaderboard-pagination").innerHTML = "";
      statusEl.textContent = "Could not load leaderboard right now.";
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".lb-tab").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".lb-tab").forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        activeLeaderboardSize = button.dataset.size;
        renderLeaderboardView(activeLeaderboardSize);
      });
    });

    loadSpiralLeaderboard();
  });
</script>
{{ end }}
